<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Limpiando cache</title>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#050a12;
  color:#d8f7ff;
  font-family:Arial, sans-serif;
}
.card{
  width:min(520px,90vw);
  padding:28px;
  border:1px solid rgba(0,245,255,.25);
  border-radius:18px;
  background:rgba(10,22,40,.92);
  box-shadow:0 0 30px rgba(0,245,255,.12);
}
h1{margin:0 0 12px;font-size:24px}
p{margin:8px 0;line-height:1.5}
small{opacity:.75}
</style>
</head>
<body>
  <div class="card">
    <h1>Limpiando cache del juego</h1>
    <p id="msg">Espera un momento. Se va a borrar la version vieja guardada en este navegador.</p>
    <small>Al terminar, esta pagina regresara al inicio del juego.</small>
  </div>
<script>
(async () => {
  const msg = document.getElementById('msg');
  try {
    if ('serviceWorker' in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map((registration) => registration.unregister()));
    }

    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map((key) => caches.delete(key)));
    }

    msg.textContent = 'Cache eliminada. Redirigiendo al juego actualizado...';
    setTimeout(() => {
      window.location.replace('/?v=limpio-' + Date.now());
    }, 1000);
  } catch (error) {
    msg.textContent = 'No se pudo limpiar automaticamente. Cierra esta ventana y avisa para hacer la limpieza manual.';
  }
})();
</script>
</body>
</html>
