<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#050a12"/>
<meta name="description" content="Triki 3D multijugador con modos en linea, local y contra IA."/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Triki 3D"/>
<link rel="manifest" href="./manifest.webmanifest"/>
<link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Triki 3D - Multijugador</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cyan:#00f5ff;--pink:#ff2d78;--gold:#ffb400;
  --dark:#050a12;--glass-border:rgba(255,255,255,0.10);
  --glow-c:0 8px 20px rgba(0,245,255,0.12);
  --glow-p:0 8px 20px rgba(255,45,120,0.12);
}
html,body{width:100%;height:100%;background:var(--dark);font-family:'Rajdhani',sans-serif;color:#e0e8f0;overflow:hidden;touch-action:none}

/* BG */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);
  background-size:60px 60px}
.scanline{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
.corner{position:fixed;width:55px;height:55px;z-index:5;pointer-events:none}
.corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);opacity:0.3}
.corner::before{width:100%;height:1px}.corner::after{width:1px;height:100%}
.corner.tl{top:10px;left:10px}.corner.tr{top:10px;right:10px;transform:scaleX(-1)}
.corner.bl{bottom:10px;left:10px;transform:scaleY(-1)}.corner.br{bottom:10px;right:10px;transform:scale(-1)}

/* CANVAS */
#canvas-container{position:fixed;inset:0;z-index:0}
#canvas-container canvas{display:block;width:100%!important;height:100%!important}

/* PARTICLES */
#particles{position:fixed;inset:0;z-index:25;pointer-events:none}

/* SCREENS */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .45s ease,transform .45s ease}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(0.96)}

/* GLASS CARD */
.glass-card{background:rgba(5,15,30,0.82);border:1px solid var(--glass-border);border-radius:22px;backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);padding:36px 44px;max-width:460px;width:100%;text-align:center;box-shadow:0 8px 60px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.07)}

/* TYPOGRAPHY */
.title-main{font-family:'Orbitron',monospace;font-size:clamp(1.9rem,6vw,3rem);font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,var(--cyan) 0%,#80ffff 40%,var(--pink) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:4px}
.title-sub{font-family:'Orbitron',monospace;font-size:clamp(0.55rem,1.8vw,0.72rem);letter-spacing:.45em;color:rgba(0,245,255,0.45);margin-bottom:32px;text-transform:uppercase}
.section-label{font-size:.6rem;letter-spacing:.38em;color:rgba(255,255,255,0.28);text-transform:uppercase;margin:16px 0 7px}
.divider{border:none;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.18),transparent);margin:20px 0}

/* BUTTONS */
.btn{display:block;width:100%;padding:13px 26px;margin:9px 0;border-radius:12px;border:none;cursor:pointer;font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;transition:all .22s ease;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.11) 100%);opacity:0;transition:opacity .22s}
.btn:hover::before{opacity:1}.btn:active{transform:scale(0.97)}
.btn-cyan{background:linear-gradient(135deg,#003a50,#00212f);border:1px solid var(--cyan);color:var(--cyan);box-shadow:var(--glow-c),inset 0 1px 0 rgba(0,245,255,0.18)}
.btn-cyan:hover{background:linear-gradient(135deg,#004d6b,#002d3d);box-shadow:0 10px 24px rgba(0,245,255,0.16),inset 0 1px 0 rgba(0,245,255,0.2)}
.btn-pink{background:linear-gradient(135deg,#3a0020,#25001a);border:1px solid var(--pink);color:var(--pink);box-shadow:var(--glow-p),inset 0 1px 0 rgba(255,45,120,0.18)}
.btn-pink:hover{background:linear-gradient(135deg,#500030,#350025);box-shadow:0 10px 24px rgba(255,45,120,0.16),inset 0 1px 0 rgba(255,45,120,0.2)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.11);color:rgba(255,255,255,0.5)}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.24)}
.btn-gold{background:linear-gradient(135deg,#3a2800,#251a00);border:1px solid var(--gold);color:var(--gold);box-shadow:0 8px 18px rgba(255,180,0,0.14),inset 0 1px 0 rgba(255,212,102,0.18)}
.btn-gold:hover{background:linear-gradient(135deg,#503800,#352400)}
.btn:disabled{opacity:0.35;cursor:not-allowed}

/* ROOM CODE */
.room-code-box{background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.25);border-radius:14px;padding:18px;margin:14px 0;position:relative}
.room-code-label{font-size:.58rem;letter-spacing:.4em;color:rgba(0,245,255,0.45);margin-bottom:6px;display:block}
.room-code{font-family:'Orbitron',monospace;font-size:2.2rem;font-weight:900;color:var(--cyan);letter-spacing:.3em;display:block}
.copy-btn{position:absolute;top:10px;right:10px;background:rgba(0,245,255,0.1);border:1px solid rgba(0,245,255,0.25);border-radius:8px;color:var(--cyan);font-size:.6rem;letter-spacing:.15em;padding:5px 10px;cursor:pointer;font-family:'Orbitron',monospace;transition:all .2s}
.copy-btn:hover{background:rgba(0,245,255,0.2)}
.copy-btn.copied{color:#00ff88;border-color:#00ff88}

/* JOIN INPUT */
.join-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.14);border-radius:12px;padding:14px 18px;color:#fff;font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;letter-spacing:.35em;text-align:center;text-transform:uppercase;outline:none;transition:border-color .2s;margin:10px 0}
.join-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,245,255,0.12)}
.join-input::placeholder{opacity:.3;font-size:.8rem;letter-spacing:.2em}

/* WAITING PULSE */
.waiting-anim{display:flex;gap:7px;justify-content:center;margin:16px 0}
.waiting-anim span{width:7px;height:7px;border-radius:50%;background:var(--cyan);animation:wDot 1.2s ease-in-out infinite}
.waiting-anim span:nth-child(2){animation-delay:.2s}.waiting-anim span:nth-child(3){animation-delay:.4s}
@keyframes wDot{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1);opacity:1}}

/* SYMBOL BADGE */
.symbol-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:30px;border:1px solid;margin:10px 0;font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;letter-spacing:.12em}
.symbol-badge.x-badge{color:var(--cyan);border-color:rgba(0,245,255,0.4);background:rgba(0,245,255,0.07);box-shadow:0 8px 18px rgba(0,245,255,0.08)}
.symbol-badge.o-badge{color:var(--pink);border-color:rgba(255,45,120,0.4);background:rgba(255,45,120,0.07);box-shadow:0 8px 18px rgba(255,45,120,0.08)}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:linear-gradient(180deg,rgba(5,10,20,0.95) 0%,transparent 100%);pointer-events:none}
#hud.hidden{display:none}
.hud-score{display:flex;gap:10px;pointer-events:none}
.score-box{background:rgba(5,15,30,0.85);border-radius:12px;border:1px solid;padding:7px 14px;text-align:center;backdrop-filter:blur(10px);min-width:64px}
.score-box.x-box{border-color:rgba(0,245,255,0.3)}.score-box.o-box{border-color:rgba(255,45,120,0.3)}
.score-box .lbl{font-family:'Orbitron',monospace;font-size:.5rem;letter-spacing:.25em;opacity:.45;display:block;margin-bottom:1px}
.score-box .sc{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900}
.x-box .sc{color:var(--cyan)}.o-box .sc{color:var(--pink)}
.hud-center{text-align:center}
.hud-turn{font-family:'Orbitron',monospace;font-size:.68rem;font-weight:700;letter-spacing:.14em;padding:7px 14px;border-radius:20px;border:1px solid;backdrop-filter:blur(10px);background:rgba(5,15,30,0.85);transition:all .3s;pointer-events:none}
.hud-turn.x-turn{color:var(--cyan);border-color:rgba(0,245,255,0.4);box-shadow:0 8px 18px rgba(0,245,255,0.08)}
.hud-turn.o-turn{color:var(--pink);border-color:rgba(255,45,120,0.4);box-shadow:0 8px 18px rgba(255,45,120,0.08)}
.hud-turn.wait-turn{color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.1)}
.ai-dots{display:none;gap:4px;align-items:center;justify-content:center;margin-top:5px}
.ai-dots.show{display:flex}
.ai-dots span{width:4px;height:4px;border-radius:50%;background:var(--pink);animation:wDot 1s ease-in-out infinite}
.ai-dots span:nth-child(2){animation-delay:.2s}.ai-dots span:nth-child(3){animation-delay:.4s}
#btn-back-hud{font-family:'Orbitron',monospace;font-size:.52rem;letter-spacing:.18em;color:rgba(255,255,255,0.38);background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 11px;cursor:pointer;pointer-events:all;transition:all .2s}
#btn-back-hud:hover{color:#fff;border-color:rgba(255,255,255,0.28)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,0.6);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .38s ease}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal-card{background:rgba(5,15,30,0.92);border-radius:22px;border:1px solid;padding:36px 32px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,0.7);transform:scale(0.9) translateY(18px);transition:transform .4s cubic-bezier(0.34,1.56,0.64,1)}
.modal-overlay.visible .modal-card{transform:scale(1) translateY(0)}
.modal-card.win{border-color:rgba(0,245,255,0.4);box-shadow:0 20px 80px rgba(0,0,0,0.7)}
.modal-card.lose{border-color:rgba(255,45,120,0.4);box-shadow:0 20px 80px rgba(0,0,0,0.7)}
.modal-card.draw{border-color:rgba(255,180,0,0.4);box-shadow:0 20px 80px rgba(0,0,0,0.7)}
.modal-emoji{font-size:3.2rem;margin-bottom:10px;display:block;animation:bnc .7s ease}
@keyframes bnc{0%,100%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(0.9)}}
.modal-title{font-family:'Orbitron',monospace;font-size:1.35rem;font-weight:900;letter-spacing:.1em;margin-bottom:6px}
.modal-sub{font-size:.88rem;opacity:.55;margin-bottom:24px}

/* STATUS BAR */
#status-bar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:20;pointer-events:none;font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:.28em;color:rgba(0,245,255,0.3);white-space:nowrap}
#status-bar.hidden{display:none}

/* ERROR TOAST */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(255,45,120,0.15);border:1px solid rgba(255,45,120,0.4);border-radius:10px;padding:10px 22px;font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--pink);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* CONNECTION DOT */
.conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse-dot 2s ease-in-out infinite}
.conn-dot.online{background:#00ff88;box-shadow:none}
.conn-dot.offline{background:var(--pink);box-shadow:none;animation:none}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

/* MODE TABS */
.mode-tabs{display:flex;gap:0;margin:0 0 20px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.1)}
.mode-tab{flex:1;padding:11px 8px;font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;letter-spacing:.1em;cursor:pointer;background:transparent;border:none;color:rgba(255,255,255,0.35);transition:all .2s}
.mode-tab.active-tab{background:rgba(0,245,255,0.1);color:var(--cyan)}

/* DIFF */
.diff-group{display:flex;gap:7px;margin:8px 0}
.diff-btn{flex:1;padding:9px 5px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.4);font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s}
.diff-btn.de{background:rgba(0,245,100,0.1);border-color:#00f564;color:#00f564;box-shadow:0 6px 14px rgba(0,245,100,0.12)}
.diff-btn.dm{background:rgba(255,180,0,0.1);border-color:var(--gold);color:var(--gold);box-shadow:0 6px 14px rgba(255,180,0,0.12)}
.diff-btn.dh{background:rgba(255,45,120,0.12);border-color:var(--pink);color:var(--pink);box-shadow:0 6px 14px rgba(255,45,120,0.12)}

/* CONFETTI */
.cf{position:fixed;width:8px;height:8px;border-radius:2px;animation:cfFall linear forwards;z-index:26;pointer-events:none}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

@media(max-width:480px){.glass-card{padding:26px 20px}.title-main{font-size:1.8rem}}
@media(max-height:600px){.glass-card{padding:18px 22px}.title-main{font-size:1.7rem}.title-sub{margin-bottom:14px}.divider{margin:12px 0}}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanline"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>
<div id="canvas-container"></div>
<canvas id="particles"></canvas>
<div id="toast"></div>
<div class="screen" id="screen-welcome">
  <div class="glass-card">
    <h1 class="title-main">TRIKI 3D</h1>
    <p class="title-sub">EDICION FUTURISTA EN LINEA</p>
    <div class="mode-tabs">
      <button class="mode-tab active-tab" id="tab-online" onclick="switchTab('online')">EN LINEA</button>
      <button class="mode-tab" id="tab-local" onclick="switchTab('local')">LOCAL</button>
      <button class="mode-tab" id="tab-ai" onclick="switchTab('ai')">CONTRA IA</button>
    </div>
    <div id="panel-online">
      <button class="btn btn-cyan" id="btn-create">+ CREAR SALA</button>
      <hr class="divider"/>
      <p class="section-label">UNIRSE CON CODIGO</p>
      <input class="join-input" id="join-input" maxlength="5" placeholder="CODIGO" autocomplete="off" spellcheck="false"/>
      <button class="btn btn-pink" id="btn-join">UNIRSE</button>
    </div>
    <div id="panel-local" style="display:none">
      <button class="btn btn-cyan" id="btn-local">JUGAR LOCAL 1 VS 1</button>
    </div>
    <div id="panel-ai" style="display:none">
      <p class="section-label">DIFICULTAD</p>
      <div class="diff-group">
        <button class="diff-btn de" data-diff="easy">FACIL</button>
        <button class="diff-btn" data-diff="medium">MEDIO</button>
        <button class="diff-btn" data-diff="hard">IMPOSIBLE</button>
      </div>
      <button class="btn btn-pink" id="btn-start-ai">INICIAR</button>
    </div>

    <hr class="divider"/>
    <p style="font-size:.65rem;opacity:.28;letter-spacing:.1em">
      <span class="conn-dot online" id="conn-dot"></span>
      <span id="conn-label">Conectado al servidor</span>
    </p>
  </div>
</div>
<div class="screen hidden" id="screen-waiting">
  <div class="glass-card">
    <span style="font-size:1.1rem;display:block;margin-bottom:12px;letter-spacing:.2em">SALA</span>
    <h2 class="title-main" style="font-size:1.6rem">SALA CREADA</h2>
    <p class="title-sub" style="margin-bottom:18px">ESPERANDO OPONENTE</p>

    <div class="room-code-box">
      <span class="room-code-label">CODIGO DE SALA</span>
      <span class="room-code" id="display-room-code">-----</span>
      <button class="copy-btn" id="copy-btn" onclick="copyCode()">COPIAR</button>
    </div>

    <p style="font-size:.78rem;opacity:.45;margin:8px 0 16px">Comparte este codigo con tu oponente</p>
    <div class="waiting-anim"><span></span><span></span><span></span></div>

    <button class="btn btn-ghost" id="btn-cancel-wait" style="margin-top:18px">CANCELAR</button>
  </div>
</div>
<div id="hud" class="hidden">
  <div class="hud-score">
    <div class="score-box x-box">
      <span class="lbl" id="lbl-x">X</span>
      <span class="sc" id="score-x">0</span>
    </div>
    <div class="score-box o-box">
      <span class="lbl" id="lbl-o">O</span>
      <span class="sc" id="score-o">0</span>
    </div>
  </div>
  <div class="hud-center">
    <div class="hud-turn x-turn" id="hud-turn">TURNO: X</div>
    <div class="ai-dots" id="ai-dots"><span></span><span></span><span></span></div>
  </div>
  <button id="btn-back-hud">VOLVER AL MENU</button>
</div>

<div id="status-bar" class="hidden">ARRASTRA PARA ROTAR Y TOCA PARA MARCAR</div>
<div class="modal-overlay" id="modal">
  <div class="modal-card" id="modal-card">
    <span class="modal-emoji" id="m-emoji">RESULTADO</span>
    <h2 class="modal-title" id="m-title">VICTORIA</h2>
    <p class="modal-sub" id="m-sub">Has ganado</p>
    <button class="btn btn-cyan" id="btn-replay">REVANCHA</button>
    <button class="btn btn-ghost" id="btn-to-menu">VOLVER AL MENU</button>
  </div>
</div>

<script>
const Audio = (() => {
  let ctx;
  const g = (fn) => { try { if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)(); fn(ctx); } catch(e){} };
  return {
    click: () => g(c => { const o=c.createOscillator(),gn=c.createGain(); o.connect(gn); gn.connect(c.destination); o.type='sine'; o.frequency.setValueAtTime(880,c.currentTime); o.frequency.exponentialRampToValueAtTime(440,c.currentTime+0.1); gn.gain.setValueAtTime(0.25,c.currentTime); gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15); o.start(); o.stop(c.currentTime+0.15); }),
    win: () => g(c => { [523,659,784,1047].forEach((f,i) => { const o=c.createOscillator(),gn=c.createGain(); o.connect(gn); gn.connect(c.destination); o.type='triangle'; o.frequency.value=f; const t=c.currentTime+i*0.12; gn.gain.setValueAtTime(0,t); gn.gain.linearRampToValueAtTime(0.2,t+0.04); gn.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(t); o.stop(t+0.4); }); }),
    lose: () => g(c => { const o=c.createOscillator(),gn=c.createGain(); o.connect(gn); gn.connect(c.destination); o.type='sawtooth'; o.frequency.setValueAtTime(300,c.currentTime); o.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.5); gn.gain.setValueAtTime(0.22,c.currentTime); gn.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.5); o.start(); o.stop(c.currentTime+0.5); }),
    draw: () => g(c => { [440,460].forEach((f,i) => { const o=c.createOscillator(),gn=c.createGain(); o.connect(gn); gn.connect(c.destination); o.type='sine'; o.frequency.value=f; const t=c.currentTime+i*0.18; gn.gain.setValueAtTime(0.18,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.3); o.start(t); o.stop(t+0.35); }); })
  };
})();
const Fx = (() => {
  const cv = document.getElementById('particles');
  const ctx = cv.getContext('2d');
  let pts = [], aid = null;
  const resize = () => { cv.width=window.innerWidth; cv.height=window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  const burst = (x,y,color,n=16) => {

const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const chkW = (b,p) => WINS.find(([a,bb,c])=>b[a]===p&&b[bb]===p&&b[c]===p);
const chkD = (b) => b.every(c=>c!==null);

const minimax = (b,isMax,d,alpha,beta) => {
  if(chkW(b,'O')) return 10-d;
  if(chkW(b,'X')) return d-10;
  if(chkD(b)) return 0;
  if(isMax){ let best=-Infinity; for(let i=0;i<9;i++){ if(!b[i]){ b[i]='O'; best=Math.max(best,minimax(b,false,d+1,alpha,beta)); b[i]=null; alpha=Math.max(alpha,best); if(beta<=alpha)break; } } return best; }
  else{ let best=Infinity; for(let i=0;i<9;i++){ if(!b[i]){ b[i]='X'; best=Math.min(best,minimax(b,true,d+1,alpha,beta)); b[i]=null; beta=Math.min(beta,best); if(beta<=alpha)break; } } return best; }
};
const bestMove = (b,diff) => {
  const empty=b.map((v,i)=>v===null?i:null).filter(i=>i!==null);
  if(diff==='easy'&&Math.random()<.7) return empty[~~(Math.random()*empty.length)];
  if(diff==='medium'&&Math.random()<.4) return empty[~~(Math.random()*empty.length)];
  let best=-Infinity,move=empty[0];
  empty.forEach(i=>{ b[i]='O'; const s=minimax(b,false,0,-Infinity,Infinity); b[i]=null; if(s>best){best=s;move=i;} });
  return move;
};

      const v=new THREE.Mesh(lh(false),lineMat); v.position.set(off,0,0); bg.add(v);

    [[-1.05,-1.05],[1.05,-1.05],[-1.05,1.05],[1.05,1.05]].forEach(([x,y])=>{
      const d=new THREE.Mesh(new THREE.SphereGeometry(.055,8,8),dm); d.position.set(x,y,.05); bg.add(d);

const Game = {
  onCellClick(idx) {
    if(GS.mode === 'online') {
      if (socket) socket.emit('make_move', { index: idx });
    } else {
      GS.board[idx] = GS.currentPlayer;
      Board3D.addMark(idx, GS.currentPlayer);
      Audio.click();
      Fx.burst(window.innerWidth/2+(Math.random()-.5)*80, window.innerHeight/2, GS.currentPlayer==='X'?'#00f5ff':'#ff2d78', 8);
      this.checkLocal();
    }
  },

  checkLocal() {
    const winCombo = chkW(GS.board, GS.currentPlayer);
    if(winCombo){
      GS.gameOver = true; Board3D.setEnabled(false);
      GS.scores[GS.currentPlayer]++; updateScoreUI();
      Board3D.showWinLine(winCombo);
      const isHumanWin = GS.mode==='local' || GS.currentPlayer==='X';
      setTimeout(() => {
        if(isHumanWin){ Audio.win(); Fx.confetti(); showModal('win',GS.currentPlayer); }
        else{ Audio.lose(); Fx.burst(window.innerWidth/2,window.innerHeight/2,'#ff2d78',30); showModal('lose',GS.currentPlayer); }
      }, 800);
      return;
    }
    if(chkD(GS.board)){
      GS.gameOver=true; Board3D.setEnabled(false);
      setTimeout(()=>{ Audio.draw(); showModal('draw',null); }, 500);
      return;
    }
    GS.currentPlayer = GS.currentPlayer==='X'?'O':'X';
    this.updateHUD();
    if(GS.mode==='ai' && GS.currentPlayer==='O') this.doAI();
  },

  doAI() {
    GS.aiTurn=true; Board3D.setEnabled(false);
    document.getElementById('ai-dots').classList.add('show');
    setTimeout(()=>{
      const m=bestMove([...GS.board],GS.diff);
      document.getElementById('ai-dots').classList.remove('show');
      GS.aiTurn=false; Board3D.setEnabled(true);
      if(m!==undefined) this.onCellClick(m);
    }, 500+Math.random()*400);
  },

  startOnline() {
    document.getElementById('lbl-x').textContent = GS.mySymbol==='X' ? 'X - TU' : 'X - RIVAL';
    document.getElementById('lbl-o').textContent = GS.mySymbol==='O' ? 'O - TU' : 'O - RIVAL';
    Board3D.clearMarks(); updateScoreUI(); this.updateHUD();
    Board3D.setEnabled(true);
    showScreen('game');
    document.getElementById('modal').classList.remove('visible');
  },

  startLocal(mode) {
    GS.mode=mode; GS.mySymbol='X'; GS.roomId=null; GS.scores={X:0,O:0}; GS.reset();
    document.getElementById('lbl-x').textContent = mode==='local' ? 'X - J1' : 'X - TU';
    document.getElementById('lbl-o').textContent = mode==='local' ? 'O - J2' : 'O - IA';
    Board3D.clearMarks(); updateScoreUI(); this.updateHUD();
    Board3D.setEnabled(true);
    showScreen('game');
  },

  updateHUD() {

    if(GS.mode==='online'){
      if (socket) socket.emit('request_replay');

  }

    if (socket) socket.emit('leave_room');
  }
  resetToMenu();
};

const goMenu = () => {
  if (GS.mode === 'online' || GS.roomId) {
    leaveOnlineRoom();
    return;
  }
  resetToMenu();
};

const copyCode = async () => {
  const code = document.getElementById('display-room-code').textContent;
  const btn = document.getElementById('copy-btn');

  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(code);
    } else {
      const helper = document.createElement('textarea');
      helper.value = code;
      helper.setAttribute('readonly', '');
      helper.style.position = 'absolute';
      helper.style.left = '-9999px';
      document.body.appendChild(helper);
      helper.select();
      document.execCommand('copy');
      document.body.removeChild(helper);
    }

    btn.textContent = 'COPIADO';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'COPIAR';
      btn.classList.remove('copied');
    }, 2000);
  } catch (error) {
    showToast('No se pudo copiar el codigo');
  }
};
const switchTab = (tab) => {
  if (tab === 'online' && !REALTIME_ENABLED) {
    showToast('Modo online no disponible en GitHub Pages');
    tab = 'local';
  }
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active-tab'));
  document.getElementById('tab-'+tab).classList.add('active-tab');
  document.getElementById('panel-online').style.display = tab==='online'?'block':'none';
  document.getElementById('panel-local').style.display = tab==='local'?'block':'none';
  document.getElementById('panel-ai').style.display = tab==='ai'?'block':'none';
};
window.switchTab = switchTab;
window.copyCode = copyCode;

if (needsStaticDeploySetup) {
  disableOnlineModeForStaticDeploy();
}

document.getElementById('btn-create').addEventListener('click', () => {
  if (!REALTIME_ENABLED) {
    showToast('Modo online no disponible en GitHub Pages');
    switchTab('local');
    return;
  }
  GS.mode = 'online';
  socket.emit('create_room');
});

document.getElementById('btn-join').addEventListener('click', () => {
  if (!REALTIME_ENABLED) {
    showToast('Modo online no disponible en GitHub Pages');
    switchTab('local');
    return;
  }
  const code = document.getElementById('join-input').value.trim().toUpperCase();
  if (code.length !== 5) { showToast('Ingresa un codigo de 5 letras'); return; }
  GS.mode='online'; GS.mySymbol='O'; socket.emit('join_room', { roomId: code });
});

document.getElementById('join-input').addEventListener('keydown', e => {
  if(e.key==='Enter') document.getElementById('btn-join').click();
});

document.getElementById('btn-cancel-wait').addEventListener('click', () => {
  leaveOnlineRoom();
});

document.getElementById('btn-local').addEventListener('click', () => Game.startLocal('local'));

let selDiff='easy';
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b=>b.className='diff-btn');
    selDiff=btn.dataset.diff;
    btn.classList.add(selDiff==='easy'?'de':selDiff==='medium'?'dm':'dh');
    GS.diff=selDiff;
  });
});

document.getElementById('btn-start-ai').addEventListener('click', () => {
  GS.diff=selDiff; Game.startLocal('ai');
});

document.getElementById('btn-back-hud').addEventListener('click', goMenu);
document.getElementById('btn-replay').addEventListener('click', () => Game.replay());
document.getElementById('btn-to-menu').addEventListener('click', goMenu);
Board3D.init();
showScreen('welcome');

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('./sw.js');
      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
      registration.update();
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
    } catch (error) {}
  });
}
</script>
</body>
</html>
